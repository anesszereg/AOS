global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['localhost:3001']
    metrics_path: '/metrics'

  - job_name: 'user-service'
    static_configs:
      - targets: ['localhost:3002']
    metrics_path: '/metrics'

  - job_name: 'restaurant-service'
    static_configs:
      - targets: ['localhost:3003']
    metrics_path: '/metrics'

  - job_name: 'menu-service'
    static_configs:
      - targets: ['localhost:3004']
    metrics_path: '/metrics'

  - job_name: 'order-service'
    static_configs:
      - targets: ['localhost:3005']
    metrics_path: '/metrics'

  - job_name: 'payment-service'
    static_configs:
      - targets: ['localhost:3006']
    metrics_path: '/metrics'

  - job_name: 'delivery-service'
    static_configs:
      - targets: ['localhost:3007']
    metrics_path: '/metrics'

  - job_name: 'notification-service'
    static_configs:
      - targets: ['localhost:3008']
    metrics_path: '/metrics'

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['localhost:10000']
    metrics_path: '/metrics'
