services:
  # Backend - All services in one container
  - type: web
    name: food-delivery-backend
    env: docker
    dockerfilePath: ./Dockerfile.all-in-one
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

  # Frontend - Static site
  - type: web
    name: food-delivery-frontend
    env: static
    buildCommand: cd frontend/food-delivery-app && npm install && npm run build
    staticPublishPath: frontend/food-delivery-app/dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://food-delivery-backend.onrender.com
