services:
  # Backend - All services in one container
  - type: web
    name: food-delivery-backend
    env: docker
    dockerfilePath: ./Dockerfile.all-in-one
    plan: free
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
